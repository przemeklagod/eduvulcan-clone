name: iOS unsigned build

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install JS dependencies
        run: npm ci

      - name: Prebuild native iOS project
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build unsigned .app for a real device
        working-directory: ios
        run: |
          set -euo pipefail
          WORKSPACE=$(ls *.xcworkspace | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            console.log(data.workspace.schemes.find(s => !s.includes('Tests')));
          ")
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned .ipa
        working-directory: ios
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          echo "Found app at $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -X eduvulcan-clone-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: eduvulcan-clone-unsigned-ipa
          path: ios/eduvulcan-clone-unsigned.ipa
          retention-days: 14

