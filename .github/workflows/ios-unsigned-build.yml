name: iOS unsigned build

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          ls /Applications | grep Xcode
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}

      - name: Install JS dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Prebuild native iOS project
        run: npx expo prebuild --platform ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build unsigned .app for a real device
        working-directory: ios
        run: |
          set -euo pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          PROJECT=$(ls -d *.xcodeproj | grep -v '^Pods\.xcodeproj$' | head -1)
          SCHEME="${PROJECT%.xcodeproj}"
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned .ipa
        working-directory: ios
        run: |
          set -euo pipefail
          echo "Build products tree:"
          find build/Build/Products -maxdepth 2
          APP_PATH=$(find build/Build/Products -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found under build/Build/Products"
            exit 1
          fi
          echo "Found app at $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -X eduvulcan-clone-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: eduvulcan-clone-unsigned-ipa
          path: ios/eduvulcan-clone-unsigned.ipa
          retention-days: 14

